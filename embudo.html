<head>

<!-- F4 Kaizen: "una sola casa". El embudo ahora vive DENTRO del CRM (app.html#embudo).
     Esta página solo redirige y CONSERVA la sesión (kux_sesion), para que los links
     guardados del equipo sigan funcionando. NO se toca localStorage. -->
<script>location.replace('app.html#embudo');</script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(135deg,#0f2438,#1b365d,#245078);color:#fff;
    display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center}
  .spin{width:26px;height:26px;border:3px solid rgba(255,255,255,.25);border-top-color:#8dc63f;border-radius:50%;
    animation:sp .8s linear infinite;margin:0 auto 14px}
  @keyframes sp{to{transform:rotate(360deg)}}
  a{color:#8dc63f;font-weight:700;text-decoration:none}
</style>
</head>
<body>
  <div>
    <div class="spin"></div>
    <div style="font-size:15px">Te estamos llevando al embudo, ahora dentro del CRM…</div>
    <div style="margin-top:14px;font-size:13px"><a href="app.html#embudo">Tocá acá si no avanza &rarr;</a></div>
  </div>
</body>
