name: Publicar Pages tras QA
# hz_fb626d12: la publicación de Pages debe BLOQUEARSE si el QA falla.
# Este workflow publica vía Actions (build_type=workflow) SOLO si el job 'qa' pasa.
# Los pasos del job 'qa' son los mismos que .github/workflows/qa.yml (required check 'qa').
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5   # v4.3.1 (pin por SHA)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020   # v4.4.0 (pin por SHA)
        with:
          node-version: '20'
      - name: Instalar Playwright + Chromium
        run: |
          npm init -y >/dev/null 2>&1
          npm i -D playwright@1.48
          npx playwright install --with-deps chromium
      - name: Correr QA (responsive + errores + piezas)
        run: node qa/check.mjs

  deploy:
    needs: qa
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5   # v4.3.1 (pin por SHA)
      - name: Configurar Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b   # v5.0.0 (pin por SHA)
      - name: Empaquetar el sitio (raíz del repo)
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa   # v3.0.1 (pin por SHA)
        with:
          path: .
      - name: Publicar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e   # v4.0.5 (pin por SHA)
