name: QA Kuxtal (en la nube)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar Playwright + Chromium
        run: |
          npm init -y >/dev/null 2>&1
          npm i -D playwright@1.48
          npx playwright install --with-deps chromium
      - name: Correr QA (responsive + errores + piezas)
        run: node qa/check.mjs
